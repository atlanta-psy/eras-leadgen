# почта Педро для автоотправки. ЗАПОЛНИ своими данными.
# узнать smtp-данные можно в панели хостинга домена или в почтовом сервисе.

smtp_host: "smtp.tuvominio.ru"      # сервер исходящей почты (напр. smtp.yandex.ru, smtp.timeweb.ru)
smtp_port: 465                       # 465 для SSL, 587 для TLS
use_ssl: true                        # true = порт 465; false = порт 587 (TLS)
smtp_user: "pedro@tudominio.ru"      # логин (обычно сам email)
smtp_password: "ПАРОЛЬ_ПРИЛОЖЕНИЯ"   # пароль почты или пароль приложения
from_email: "pedro@tudominio.ru"     # с какого адреса уходит
from_name: "Педро де Лас Эрас"       # имя отправителя

send_delay_sec: 25                   # пауза между письмами (защита от спам-фильтра)
unsubscribe_text: "Если предложение не актуально — ответьте «отписаться», и я больше не напишу. С уважением, Педро."
