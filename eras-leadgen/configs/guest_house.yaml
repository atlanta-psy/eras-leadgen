# конфиг ниши: гостевые дома
# bbox = [юг, запад, север, восток] (широта/долгота)

osm_tags:
  - tourism=guest_house
  - tourism=hostel
  - tourism=apartment

limit_per_area: 400
overpass_timeout: 60

areas:
