  kavminvody:   [43.80, 42.50, 44.30, 43.20]   # кмв (кисловодск, пятигорск)
  altai:        [50.50, 84.50, 52.50, 87.50]   # горный алтай
  baikal:       [51.40, 103.50, 53.40, 109.00] # байкал
  kaliningrad:  [54.30, 19.70, 55.30, 22.90]   # калининградская обл
  spb:          [59.60, 29.30, 60.30, 30.70]   # спб и ленобласть
  karelia:      [61.00, 30.00, 64.50, 36.00]   # карелия
