# источник 2ГИС для ниши гостевые дома
# ключ получить бесплатно в кабинете разработчика 2ГИС (Catalog API).

api_key: "ВСТАВЬ_КЛЮЧ_2GIS"     # обязательно
query: "гостевой дом"            # что ищем
page_size: 50                    # макс 50 у 2гис
max_pages: 10                    # сколько страниц на город (50*10 = до 500 на город)

# города поиска (можно дополнять)
cities:
  - Сочи
  - Адлер
  - Анапа
  - Геленджик
  - Ялта
  - Симферополь
  - Кисловодск
  - Калининград
  - Санкт-Петербург
  - Казань
  - Москва
