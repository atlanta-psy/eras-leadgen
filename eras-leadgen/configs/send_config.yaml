# лимиты и прогрев отправки. редактируй под себя.

# сколько максимум в день на канал (после прогрева)
caps:
  email: 40
  telegram: 20
  vk: 15

# прогрев: первые дни шлём мало, наращиваем. защищает аккаунты от бана.
warmup:
  enabled: true
  start: 5     # в день 1 — по 5 на канал
  step: 5      # каждый следующий день +5, пока не упрёмся в caps

# когда подкидывать касания (если не ответили)
follow_up:
  first_after_days: 3
  second_after_days: 7
