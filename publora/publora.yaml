# настройки автопостинга в Publora
# ключ Publora НЕ вписывай сюда — положи его в отдельный файл (см. key_file), его не коммитим.

key_file: "./publora_key.txt"     # текстовый файл, в нём одна строка — твой ключ sk_...
threads_platform: "threads-27383823334635677"   # atlanta_psy
utc_offset_hours: 3               # твой часовой пояс (Москва = 3)
default_times: ["09:00", "13:00", "19:00"]   # во сколько публиковать (по твоему времени)
per_day: 3                        # сколько тредов в день
start_offset_days: 0              # 0 = начинать с сегодня, 1 = с завтра
